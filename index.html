<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kanboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <nav>
            <div class="left">KANBOARD</div>
            <div class="right"><button>Add New Task</button></div>
        </nav>
        <section class="tasks">
            <div id="todo" class="task-column ">
                <div class="heading">
                    <div class="left">To Do </div>
                    <div class="right">count</div>
                </div>
                <div draggable="true" class="task">
                    <h2>Task 1</h2>
                    <p> hey i am task 1</p>
                    <button>delete</button>
                </div>
            </div>
            <div id="progress" class="task-column">
                <div class="heading">
                    <div class="left">In Progess </div>
                    <div class="right">count</div>
                </div>

            </div>
            <div id="done" class="task-column">
                <div class="heading">
                    <div class="left">Done</div>
                    <div class="right">count</div>
                </div>

            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
